title = "Ashwin's Blog"
baseURL = "https://ashwinupadhyaya.com"
languageCode = "en-us"
theme = "ananke"
#resourceDir = "../resources"

DefaultContentLanguage = "en"
SectionPagesMenu = "main"
Paginate = 6 # this is set low for demonstrating with dummy content. Set to a higher number
googleAnalytics = ""
enableRobotsTXT = true

[languages]
  [languages.en]
    title = "Ashwin's Blog"
    weight = 1
    contentDir = "content/en"
    # languageDirection = 'rtl' for Right-To-Left languages
#  [languages.fr]
#    title = "Ananke Fr"
#    weight = 2
#    contentDir = "content/fr"

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  text_color = ""
  author = ""
  favicon = ""
  site_logo = ""
  description = "Experiment, Explore, Enjoy"
  # choose a background color from any on this page: https://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "bg-blue"
  recent_posts_number = 9

[[params.ananke_socials]]
name = "linkedin"
url = "https://www.linkedin.com/in/ashwinupadhyaya"

[[params.ananke_socials]]
name = "github"
url = "https://github.com/ashwin67"
